<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rainfall Prediction</title>
</head>

<body background="https://wallpaperaccess.com/full/701614.jpg" text="black">

<div class="login">
  <center><h1>Rainfall Prediction</h1></center>
  <b><h2>Please enter the following details</h2></b>

  <form action="{{ url_for('predict') }}" method="post">

    <!-- Location -->
    <label for="Location">Location:</label>
    <select id="Location" name="Location">
      <option value="2">Albury</option>
      <option value="4">BadgerysCreek</option>
      <option value="10">Cobar</option>
      <option value="11">CoffsHarbour</option>
      <option value="21">Moree</option>
      <option value="24">Newcastle</option>
      <option value="26">NorahHead</option>
      <option value="27">NorfolkIsland</option>
      <option value="30">Penrith</option>
      <option value="34">Richmond</option>
      <option value="37">Sydney</option>
      <option value="38">SydneyAirport</option>
      <option value="42">WaggaWagga</option>
      <option value="45">Williamtown</option>
      <option value="47">Wollongong</option>
      <option value="9">Canberra</option>
      <option value="48">Tuggeranong</option>
      <option value="23">MountGinini</option>
      <option value="5">Ballarat</option>
      <option value="6">Bendigo</option>
      <option value="35">Sale</option>
      <option value="19">MelbourneAirport</option>
      <option value="18">Melbourne</option>
      <option value="20">Mildura</option>
      <option value="25">Nhil</option>
      <option value="33">Portland</option>
      <option value="44">Watsonia</option>
    </select>

    <br><br>

    <!-- Weather Inputs -->
    <input type="text" name="MinTemp" placeholder="MinTemp">
    <input type="text" name="MaxTemp" placeholder="MaxTemp">
    <input type="text" name="Rainfall" placeholder="Rainfall">
    <input type="text" name="WindGustSpeed" placeholder="WindGustSpeed">
    <br><br>

    <input type="text" name="WindSpeed9am" placeholder="WindSpeed9am">
    <input type="text" name="WindSpeed3pm" placeholder="WindSpeed3pm">
    <input type="text" name="Humidity9am" placeholder="Humidity9am">
    <input type="text" name="Humidity3pm" placeholder="Humidity3pm">
    <input type="text" name="Pressure9am" placeholder="Pressure9am">
    
    <br><br>

    <input type="text" name="Pressure3pm" placeholder="Pressure3pm">
    <input type="text" name="Temp9am" placeholder="Temp9am">
    <input type="text" name="Temp3pm" placeholder="Temp3pm">
    <input type="text" name="Year" placeholder="Year">
    <input type="text" name="Month" placeholder="Month">
    <input type="text" name="Day" placeholder="Day">

    <br><br>

    <!-- Rain Today -->
    <label for="RainToday">RainToday:</label>
    <select id="RainToday" name="RainToday">
      <option value="0">No</option>
      <option value="1">Yes</option>
    </select>

    <br><br>

    <!-- Wind Directions -->
    <input type="text" name="WindDir9am" placeholder="WindDir9am">
    <input type="text" name="WindDir3pm" placeholder="WindDir3pm">

    <br><br>

    <!-- Wind Gust Direction -->
    <label for="WindGustDir">WindGustDir:</label>
    <select id="WindGustDir" name="WindGustDir">
      <option value="W">W</option>
      <option value="WNW">WNW</option>
      <option value="WSW">WSW</option>
      <option value="NE">NE</option>
      <option value="NNW">NNW</option>
      <option value="N">N</option>
      <option value="NNE">NNE</option>
      <option value="SW">SW</option>
      <option value="ENE">ENE</option>
      <option value="SSE">SSE</option>
      <option value="S">S</option>
      <option value="NW">NW</option>
      <option value="SE">SE</option>
      <option value="ESE">ESE</option>
      <option value="E">E</option>
      <option value="SSW">SSW</option>
    </select>

    <br><br>

    <button type="submit" style="height:30px;width:200px">
      Predict
    </button>

  </form>

  <br>
  {{ prediction_text }}

  <br><br>

  <img src="data:image/png;base64,{{url_1}}" height="180" width="233" onerror="this.style.display='none'"/>
  <img src="data:image/png;base64,{{url_2}}" height="180" width="233" onerror="this.style.display='none'"/>
  <img src="data:image/png;base64,{{url_3}}" height="180" width="233" onerror="this.style.display='none'"/>
  <img src="data:image/png;base64,{{url_4}}" height="150" width="711" onerror="this.style.display='none'"/>

</div>
</body>
</html>
